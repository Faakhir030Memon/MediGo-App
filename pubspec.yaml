name: medigo_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.11.5
  firebase_auth: ^5.4.4
  cloud_firestore: ^5.6.0
  firebase_messaging: ^15.2.0
  firebase_storage: ^12.4.0

  # Maps & Location
  google_maps_flutter: ^2.17.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  geoflutterfire_plus: ^0.0.2

  # Notifications
  flutter_local_notifications: ^16.3.0

  # State Management
  get: ^4.6.6
  provider: ^6.1.2

  # Networking
  http: ^1.2.0
  dio: ^5.4.0

  # File & Media
  image_picker: ^1.0.7
  file_picker: ^6.1.1

  # PDF
  pdf: ^3.10.7
  printing: ^5.12.0

  # UI
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  pin_code_fields: ^8.0.1

  # Utils
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true